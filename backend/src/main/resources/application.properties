spring.application.name=labbook
server.port=8080

#H2 in-memory database (for demo)
spring.datasource.url=jdbc:h2:mem:labbookdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=giangdang
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 console (@ /h2console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2console

#GraphQL config
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.graphql.cors.allowed-methods=GET,POST,PUT,DELETE

# CORS for REST
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173